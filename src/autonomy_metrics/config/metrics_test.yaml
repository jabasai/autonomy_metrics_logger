git_repos_base_path: "/home/ros/aoc_strawberry_scenario_ws/src/aoc_strawberry_scenario"

git_repos:
  scenario: "."
  autonomy_metrics_logger: "jabas/autonomy_metrics_logger"

runtime:
  heartbeat_topic: "/autonomy_metrics/heartbeat"
  session_summary_topic: "/autonomy_metrics/session_summary_json"
  heartbeat_period_sec: 0.5
  snapshot_interval_sec: 2.0
  distance_epsilon_m: 0.01
  stale_speed_timeout_sec: 1.0

topics:
  - name: "/autonomous_mode"
    type: "std_msgs/msg/Bool"
    role: "autonomous_mode"
    snapshot: true

  - name: "/autonomy_checks/heartbeat"
    type: "std_msgs/msg/Bool"
    role: "intervention_heartbeat"
    metric_key: "autonomy_checks"
    snapshot: true

  - name: "/navigation_safe/heartbeat"
    type: "std_msgs/msg/Bool"
    role: "intervention_heartbeat"
    metric_key: "navigation_safe"
    snapshot: true

  - name: "/system_check/heartbeat"
    type: "std_msgs/msg/Bool"
    role: "intervention_heartbeat"
    metric_key: "system_check"
    snapshot: true

  - name: "/robot_state"
    type: "std_msgs/msg/String"
    role: "robot_state"
    snapshot: true

  - name: "/gophar_vehicle_controller/odometry"
    type: "nav_msgs/msg/Odometry"
    role: "distance_odometry"
    snapshot: true

  - name: "/robot_navigation_area"
    type: "std_msgs/msg/String"
    role: "navigation_area"
    snapshot: true

  - name: "/plan"
    type: "nav_msgs/msg/Path"
    role: "global_path"
    snapshot: true

  - name: "/odometry/global"
    type: "nav_msgs/msg/Odometry"
    role: "global_pose_odometry"
    snapshot: true
